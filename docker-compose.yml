version: "3.9"

services:

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexusforge_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── MQTT Broker (Mosquitto) ──────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: nexusforge_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"    # WebSocket
    volumes:
      - ./infra/docker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: nexusforge_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER=mosquitto
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Dashboard ────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: ../infra/docker/Dockerfile.dashboard
    container_name: nexusforge_dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ─── TimescaleDB (telemetry storage) ─────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: nexusforge_timescale
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nexusforge
      - POSTGRES_USER=nexus
      - POSTGRES_PASSWORD=nexusforge_dev
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./infra/docker/timescale_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Prometheus (metrics) ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nexusforge_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles: ["monitoring"]

  # ─── Grafana (dashboards) ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nexusforge_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=nexusforge
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles: ["monitoring"]

volumes:
  redis_data:
  mqtt_data:
  timescale_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: nexusforge_net
