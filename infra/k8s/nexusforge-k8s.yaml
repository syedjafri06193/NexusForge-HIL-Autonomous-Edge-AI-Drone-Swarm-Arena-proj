---
# NexusForge Kubernetes Manifests
# Deploy to any k8s cluster with: kubectl apply -f nexusforge-k8s.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: nexusforge

---
# ─── ConfigMap ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexusforge-config
  namespace: nexusforge
data:
  REDIS_URL: "redis://redis-svc:6379"
  CORS_ORIGINS: "*"
  PYTHONUNBUFFERED: "1"

---
# ─── Redis ────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nexusforge
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "200m" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: nexusforge
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]

---
# ─── API ──────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusforge-api
  namespace: nexusforge
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: nexusforge/api:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: nexusforge-config }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits:   { memory: "1Gi",   cpu: "1000m" }
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: nexusforge
spec:
  selector: { app: api }
  ports: [{ port: 8000, targetPort: 8000 }]

---
# ─── Dashboard ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusforge-dashboard
  namespace: nexusforge
spec:
  replicas: 1
  selector:
    matchLabels: { app: dashboard }
  template:
    metadata:
      labels: { app: dashboard }
    spec:
      containers:
        - name: dashboard
          image: nexusforge/dashboard:latest
          ports: [{ containerPort: 80 }]
          resources:
            requests: { memory: "32Mi", cpu: "10m" }
            limits:   { memory: "128Mi", cpu: "100m" }
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-svc
  namespace: nexusforge
spec:
  selector: { app: dashboard }
  ports: [{ port: 80, targetPort: 80 }]

---
# ─── Ingress ──────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusforge-ingress
  namespace: nexusforge
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/upgrade: "websocket"
    nginx.ingress.kubernetes.io/connection: "upgrade"
spec:
  rules:
    - host: nexusforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: dashboard-svc, port: { number: 80 } }
          - path: /sessions
            pathType: Prefix
            backend:
              service: { name: api-svc, port: { number: 8000 } }
          - path: /health
            pathType: Exact
            backend:
              service: { name: api-svc, port: { number: 8000 } }

---
# ─── HPA ──────────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: nexusforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexusforge-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
