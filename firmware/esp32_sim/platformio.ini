[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.0
  ; For real TFLite Micro inference:
  ; tensorflow/tflite-micro-esp-examples

build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM
  -O2

board_build.partitions = huge_app.csv
board_build.flash_mode = qio

[env:stm32f4]
platform = ststm32
board = disco_f407vg
framework = arduino
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.0
